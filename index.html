<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.json">
    <title>動画シェア</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; }
        .full-btn {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
        }
        .full-btn:active { transform: scale(0.97); }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <button id="main-btn" 
            onclick="handleTap()"
            class="full-btn bg-gradient-to-br from-indigo-600 via-purple-600 to-violet-600 text-white">
        <div class="text-center px-8">
            <div id="icon" class="mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-24 h-24 opacity-90" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 4.01V8" />
                </svg>
            </div>
            <div id="btn-text" class="text-4xl font-bold tracking-tighter">タップして開始</div>
            <div id="btn-sub" class="mt-6 text-lg opacity-75">1回目: 情報取得</div>
        </div>
    </button>

    <script>
        let state = 'initial';
        let videoID = null;
        let initialText = '';
        let preparedFile = null;

        async function base64ToBlob(base64) {
            const byteCharacters = atob(base64);
            const chunks = [];
            const chunkSize = 512 * 1024;
            for (let i = 0; i < byteCharacters.length; i += chunkSize) {
                const chunk = byteCharacters.slice(i, i + chunkSize);
                const byteNumbers = new Array(chunk.length);
                for (let j = 0; j < chunk.length; j++) byteNumbers[j] = chunk.charCodeAt(j);
                chunks.push(new Uint8Array(byteNumbers));
            }
            return new Blob(chunks, { type: 'video/mp4' });
        }

        async function handleTap() {
            const btn = document.getElementById('main-btn');
            const textEl = document.getElementById('btn-text');
            const subEl = document.getElementById('btn-sub');

            if (state === 'initial') {
                // 1回目: 情報取得
                textEl.textContent = '情報取得中...';
                subEl.textContent = '';
                btn.style.pointerEvents = 'none';

                try {
                    const res = await fetch('https://script.google.com/macros/s/AKfycbyC3JSlfl1Z-wgxKEd87Lq4uFw3Ni6xQLkh7pH65EYibQ9_CD8rxe1Avv9hh5AH_UHqvA/exec');
                    const text = await res.text();
                    initialText = text.trim();

                    const match = text.match(/\/video\/(\d{19})/) || text.match(/(\d{19})/);
                    if (!match) throw new Error('IDなし');
                    videoID = match[1];

                    state = 'ready';
                    textEl.textContent = '準備完了';
                    subEl.textContent = '2回目: デコード';
                    btn.classList.add('from-emerald-600', 'via-teal-600', 'to-cyan-600');
                } catch (e) {
                    textEl.textContent = '取得失敗';
                    subEl.textContent = '再タップ';
                } finally {
                    btn.style.pointerEvents = 'auto';
                }
            } else if (state === 'ready') {
                // 2回目: デコードのみ
                textEl.textContent = 'デコード中...';
                subEl.textContent = '動画を準備しています';
                btn.style.pointerEvents = 'none';

                try {
                    const url = `https://script.google.com/macros/s/AKfycbyGzo7krJlaBF5PTB867x24C323gSIHfuZ9z5qKq0N83ZqPE8ZjI0raJK68evS6Z8er/exec?v=${videoID}`;
                    const res = await fetch(url);
                    const base64 = await res.text();

                    const blob = await base64ToBlob(base64);
                    preparedFile = new File([blob], `video_${videoID}.mp4`, { type: 'video/mp4' });

                    state = 'share_ready';
                    textEl.textContent = '準備完了';
                    subEl.textContent = '3回目タップでシェア';
                    btn.classList.add('from-violet-600', 'via-purple-600', 'to-fuchsia-600');
                } catch (e) {
                    console.error(e);
                    textEl.textContent = 'デコード失敗';
                    subEl.textContent = '2回目再タップ';
                } finally {
                    btn.style.pointerEvents = 'auto';
                }
            } else if (state === 'share_ready' && preparedFile) {
                // 3回目: シェア
                textEl.textContent = 'シェア中...';
                subEl.textContent = '';

                try {
                    await navigator.share({
                        title: 'TikTok動画',
                        text: initialText,
                        files: [preparedFile]
                    });
                    textEl.textContent = 'シェア完了 ✓';
                    subEl.textContent = '成功！';
                } catch (e) {
                    console.error(e);
                    textEl.textContent = 'シェア失敗';
                    subEl.textContent = 'もう一度タップ';
                }
            }
        }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
